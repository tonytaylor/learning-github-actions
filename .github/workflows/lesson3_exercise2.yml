name: "Lesson 3: Exercise 2"

on:
  workflow_dispatch:

jobs:
  generate-primes:
    runs-on: ubuntu-latest
    steps:
      - name: Generate the first 10 prime numbers
        run: |
          import math

          # the cursor
          count = 3

          # The set that contains prime numbers
          primes = set([1, 2])

          while len(primes) < 10:
            is_prime = True

            for x in range(2, int(math.sqrt(count) + 1)):
              if count % x == 0:
                is_prime = False
                break
                
            if is_prime:
              primes.add(count)

            count += 1

          print(primes)

          with open('primes.txt', 'w') as f:
            for prime in primes:
              f.write(str(prime) + '\n')
        shell: python
        
      - name: Upload primes file
        uses: actions/upload-artifact@v4
        with:
          name: primes-output
          path: primes.txt
          
  verify-primes:
    runs-on: ubuntu-latest
    needs: generate-primes
    steps:
      - name: Download primes file
        uses: actions/download-artifact@v4
        with:
          name: primes-output
      - name: Verify the generated primes
        run: |
          with open('primes.txt', 'r') as f:
            primes = set([int(line.strip()) for line in f.readlines()])

          expected_primes = [1, 2, 3, 5, 7, 11, 13, 17, 19, 23]

          assert primes == expected_primes
        shell: python
  
